<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#fdf0f8"/>
<meta name="description" content="Cuide do seu poodle — alimente, brinque e dê carinho!"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Petit Poodle"/>
<link rel="icon" href="icons/icon-poodle.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="icons/icon-poodle.svg"/>
<link rel="manifest" href="icons/site.webmanifest"/>
<title>Petit Poodle</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/hearts.css"/>
<link rel="stylesheet" href="css/responsive.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink:   #f06292;
    --pink-d: #c2185b;
    --pink-l: #fce4ec;
    --bg:     #fdf0f8;
    --card:   #ffffff;
    --text:   #4a1942;
    --muted:  #b06090;
    --green:  #c8e6c9;
    --gold:   #ffd700;
    --purple: #9c27b0;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 16px 32px;
    padding-top: max(20px, env(safe-area-inset-top));
  }

  .bg-blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .blob { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.28; }
  .blob1 { width: 300px; height: 300px; background: #f8bbd0; top: -60px; left: -60px; animation: drift 9s ease-in-out infinite alternate; }
  .blob2 { width: 220px; height: 220px; background: #e1bee7; bottom: -50px; right: -50px; animation: drift 11s ease-in-out infinite alternate-reverse; }
  @keyframes drift { from{transform:translate(0,0)} to{transform:translate(18px,14px)} }

  #app {
    position: relative; z-index: 1;
    width: 100%; max-width: 460px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.9) translateY(16px)} to{opacity:1;transform:scale(1) translateY(0)} }

  #top-bar {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 2px;
  }
  #poodle-name {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: var(--text);
  }
  #poodle-name span { color: var(--pink); }
  #back-btn {
    font-size: 12px; color: var(--muted); cursor: pointer;
    background: white; border: 0.5px solid #f0c0da; border-radius: 20px;
    padding: 5px 12px; font-family: 'Nunito', sans-serif; font-weight: 600;
    transition: all 0.15s;
  }
  #back-btn:hover { background: var(--pink-l); color: var(--pink-d); }

  #level-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #f3e5f5, #ede7f6);
    border-radius: 16px;
    padding: 8px 12px;
    border: 0.5px solid rgba(156, 39, 176, 0.2);
  }
  #level-info {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #level-icon {
    font-size: 24px;
  }
  #level-details {
    display: flex;
    flex-direction: column;
  }
  #level-text {
    font-weight: 700;
    color: var(--purple);
    font-size: 13px;
  }
  #level-number {
    font-weight: 800;
    color: #7b1fa2;
    font-size: 18px;
    font-family: 'Fredoka One', cursive;
  }
  #xp-bar-container {
    flex: 1;
    height: 8px;
    background: rgba(156, 39, 176, 0.15);
    border-radius: 99px;
    overflow: hidden;
  }
  #xp-bar {
    height: 100%;
    background: linear-gradient(90deg, #ce93d8, #ab47bc);
    width: 0%;
    transition: width 0.5s ease;
    border-radius: 99px;
  }
  #xp-text {
    font-size: 11px;
    font-weight: 600;
    color: var(--purple);
    min-width: 65px;
    text-align: right;
  }

  #stats-row {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; width: 100%;
  }
  .stat-card {
    background: white; border-radius: 12px; border: 0.5px solid rgba(210,160,200,0.3);
    padding: 8px 5px; text-align: center;
  }
  .stat-lbl { font-size: 10px; color: var(--muted); margin-bottom: 4px; display: flex; align-items: center; justify-content: center; gap: 3px; font-weight: 600; }
  .stat-bar { width: 100%; height: 6px; background: rgba(210,160,200,0.15); border-radius: 99px; overflow: hidden; }
  .stat-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
  .stat-num { font-size: 11px; font-weight: 700; color: var(--text); margin-top: 3px; }

  #money-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: -4px;
  }
  #shop-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #fff3e0, #ffe0b2);
    color: #e65100;
    font-weight: 700;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 20px;
    text-decoration: none;
    border: 0.5px solid rgba(230, 81, 0, 0.25);
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: 'Nunito', sans-serif;
    box-shadow: 0 2px 8px rgba(255, 152, 0, 0.12);
  }
  #shop-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(255, 152, 0, 0.2);
  }
  #shop-link:active { transform: scale(0.97); }
  #money-card {
    background: linear-gradient(135deg, #fff8e1, #fff3cd);
    border-radius: 20px;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    border: 0.5px solid rgba(255, 193, 7, 0.3);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  #money-icon {
    font-size: 18px;
  }
  #money-amount {
    font-weight: 800;
    font-size: 18px;
    color: #f57c00;
    font-family: 'Fredoka One', cursive;
  }
  #money-label {
    font-size: 11px;
    color: #f9a825;
    font-weight: 600;
  }

  #scene {
    position: relative; width: 200px; height: 210px; flex-shrink: 0;
  }
  #bubble {
    position: absolute; top: 2px; right: max(-18px, -4vw);
    background: white; border-radius: 20px; padding: 3px 10px;
    font-size: 14px; border: 0.5px solid rgba(210,160,200,0.4); z-index: 2;
    transition: transform 0.3s;
  }
  #poodle-wrap {
    cursor: pointer; position: absolute; bottom: 44px; left: 50%;
    transform: translateX(-50%);
    transition: filter 0.15s;
    user-select: none;
  }
  #poodle-wrap:hover { filter: brightness(1.04); }
  #poodle-img {
    width: 140px; height: 162px; object-fit: contain;
    display: block;
  }
  #ground {
    position: absolute; bottom: 0; left: 0; right: 0; height: 44px;
    background: var(--green); border-radius: 0 0 14px 14px;
  }
  #zzz {
    position: absolute; top: 10px; left: 62%; font-size: 16px;
    opacity: 0; pointer-events: none;
  }
  #itemanim {
    position: absolute; font-size: 24px; opacity: 0;
    pointer-events: none; top: 28px; left: 50%;
  }

  #msg-box {
    background: white; border: 0.5px solid rgba(210,160,200,0.35);
    border-radius: 20px; padding: 7px 18px;
    font-size: 13px; font-weight: 600; color: var(--text);
    text-align: center; max-width: 340px; width: 100%;
    min-height: 32px; transition: all 0.3s;
  }

  #carousel-wrap {
    width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  #sec-nav {
    display: flex; align-items: center; justify-content: space-between; width: 100%;
  }
  .nav-arrow {
    background: white; border: 0.5px solid rgba(210,160,200,0.5);
    border-radius: 50%; width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .nav-arrow:hover { background: var(--pink-l); border-color: var(--pink); }
  .nav-arrow:active { transform: scale(0.9); }

  #sec-header { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
  #sec-icon { display: flex; align-items: center; justify-content: center; }
  #sec-name {
    font-family: 'Fredoka One', cursive; font-size: 16px;
    color: var(--text); letter-spacing: 0.3px;
  }
  #sec-dots { display: flex; gap: 6px; margin-top: 2px; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(210,160,200,0.3); transition: background 0.3s, transform 0.3s;
  }
  .dot.active { background: var(--pink); transform: scale(1.2); }

  #sec-card {
    background: white; border-radius: 16px;
    border: 0.5px solid rgba(210,160,200,0.3);
    padding: 18px 14px; width: 100%;
    box-shadow: 0 2px 16px rgba(200,80,140,0.07);
  }
  .sec-desc {
    font-size: 12px; color: var(--muted); text-align: center;
    margin-bottom: 14px; font-weight: 600;
  }
  .btn-grid { display: grid; gap: 10px; }
  .cols2 { grid-template-columns: 1fr 1fr; }
  .cols3 { grid-template-columns: 1fr 1fr 1fr; }

  .act-btn {
    background: var(--bg); border: 0.5px solid rgba(210,160,200,0.4);
    border-radius: 14px; padding: 16px 8px 12px;
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 6px; transition: all 0.15s;
    font-family: 'Nunito', sans-serif; width: 100%;
  }
  .act-btn:hover { background: var(--pink-l); border-color: var(--pink); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(240,98,146,0.15); }
  .act-btn:active { transform: scale(0.95); }
  .act-btn .lbl { font-size: 13px; color: var(--text); font-weight: 700; }
  .act-btn .sub { font-size: 10px; color: var(--muted); font-weight: 600; }
  .act-btn.disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

  #stock-row {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stock-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 14px;
    border: 0.5px solid rgba(210,160,200,0.35);
    background: white;
    transition: background 0.2s, border-color 0.2s;
  }
  .stock-pill .stock-emoji { font-size: 22px; line-height: 1; }
  .stock-pill .stock-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }
  .stock-pill .stock-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--muted);
  }
  .stock-pill .stock-count {
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    line-height: 1;
    color: var(--text);
  }
  .stock-pill .stock-unit {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
  }
  .stock-pill.stock-food { border-color: rgba(229, 115, 115, 0.35); }
  .stock-pill.stock-water { border-color: rgba(100, 181, 246, 0.35); }
  .stock-pill.stock-empty {
    background: #fafafa;
    border-style: dashed;
  }
  .stock-pill.stock-empty .stock-count { color: #c62828; }
  .stock-pill.stock-empty .stock-unit { color: #e57373; }

  .act-btn .sub.stock-ok { color: #2e7d32; }
  .act-btn .sub.stock-low { color: #e65100; }
  .act-btn .sub.stock-none { color: #c62828; }

  @keyframes floatup { 0%{opacity:1;transform:translateY(0) translateX(-50%)} 100%{opacity:0;transform:translateY(-52px) translateX(-50%)} }
  @keyframes boing { 0%,100%{transform:translateX(-50%) scale(1)} 35%{transform:translateX(-50%) scale(1.1) translateY(-10px)} 65%{transform:translateX(-50%) scale(0.94)} }
  @keyframes wiggle { 0%,100%{transform:translateX(-50%)} 20%{transform:translateX(calc(-50% - 8px))} 50%{transform:translateX(calc(-50% + 8px))} 80%{transform:translateX(calc(-50% - 4px))} }
  @keyframes floatzz { 0%{opacity:0;transform:translateY(0)} 40%{opacity:1} 100%{opacity:0;transform:translateY(-36px)} }
  @keyframes slideIn { 0%{opacity:0;transform:translateX(var(--slide-from,40px))} 100%{opacity:1;transform:translateX(0)} }
  @keyframes levelUp { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }

  .timao-badge {
    background: #1a1a1a; color: white;
    font-size: 11px; font-weight: 700; font-family: 'Fredoka One', cursive;
    padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px;
    display: none;
  }
  .timao-badge.show { display: inline-block; }

  .level-up-animation {
    animation: levelUp 0.5s ease;
  }

</style>
</head>
<body class="page-game">

<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
</div>

<div id="app">

  <div id="top-bar">
    <div>
      <div id="poodle-name">🐩 <span id="name-display">Poodle</span></div>
      <div class="timao-badge" id="timao-badge">⚫⚪ skin especial!</div>
    </div>
    <button id="back-btn" onclick="window.location.href='index.html'">trocar nome</button>
  </div>

  <div id="level-row">
    <div id="level-info">
      <span id="level-icon">⭐</span>
      <div id="level-details">
        <span id="level-text">Nível</span>
        <span id="level-number">1</span>
      </div>
    </div>
    <div id="xp-bar-container">
      <div id="xp-bar"></div>
    </div>
    <span id="xp-text">0/100 XP</span>
  </div>

  <div id="stats-row">
    <div class="stat-card">
      <div class="stat-lbl">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#e57373" stroke-width="2.2" stroke-linecap="round"><path d="M18 8a6 6 0 0 1-6 6 6 6 0 0 1-6-6 6 6 0 0 1 12 0z"/><path d="M12 2v2M4.93 4.93l1.41 1.41M17.66 6.34l1.41-1.41"/></svg>fome
      </div>
      <div class="stat-bar"><div class="stat-fill" id="bar-hunger" style="background:#ef9a9a;width:0%"></div></div>
      <div class="stat-num" id="val-hunger">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#64b5f6" stroke-width="2.2" stroke-linecap="round"><path d="M12 2C12 2 5 10 5 14a7 7 0 0 0 14 0c0-4-7-12-7-12z"/></svg>água
      </div>
      <div class="stat-bar"><div class="stat-fill" id="bar-water" style="background:#90caf9;width:0%"></div></div>
      <div class="stat-num" id="val-water">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#f06292" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>humor
      </div>
      <div class="stat-bar"><div class="stat-fill" id="bar-happy" style="background:#f48fb1;width:80%"></div></div>
      <div class="stat-num" id="val-happy">80</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#aed581" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>energia
      </div>
      <div class="stat-bar"><div class="stat-fill" id="bar-energy" style="background:#c5e1a5;width:90%"></div></div>
      <div class="stat-num" id="val-energy">90</div>
    </div>
  </div>

  <div id="money-row">
    <a id="shop-link" href="shop.html">🛒 Mercadinho</a>
    <div id="money-card">
      <span id="money-icon">🪙</span>
      <span id="money-amount">50</span>
      <span id="money-label">moedas</span>
    </div>
  </div>

  <div id="stock-row">
    <div class="stock-pill stock-food" id="stock-food-pill">
      <span class="stock-emoji">🍖</span>
      <div class="stock-info">
        <span class="stock-label">Ração</span>
        <span class="stock-count" id="stock-food-count">0</span>
        <span class="stock-unit" id="stock-food-unit">no estoque</span>
      </div>
    </div>
    <div class="stock-pill stock-water" id="stock-water-pill">
      <span class="stock-emoji">💧</span>
      <div class="stock-info">
        <span class="stock-label">Água</span>
        <span class="stock-count" id="stock-water-count">0</span>
        <span class="stock-unit" id="stock-water-unit">no estoque</span>
      </div>
    </div>
  </div>

  <div id="scene">
    <div id="hearts-layer" aria-hidden="true"></div>
    <div id="bubble">😊</div>
    <div id="zzz">💤</div>
    <div id="itemanim"></div>
    <div id="poodle-wrap" onclick="petPoodle()" title="clique para dar carinho!">
      <img id="poodle-img" src="poodle.png" alt="poodle" width="140" height="162"/>
    </div>
    <div id="ground"></div>
  </div>

  <div id="msg-box">Oi! Que saudade! Preciso de comida e água! 🥺</div>

  <div id="carousel-wrap">
    <div id="sec-nav">
      <div class="nav-arrow" onclick="prevSec()" aria-label="seção anterior">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8B3A6B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div id="sec-header">
        <div id="sec-icon"></div>
        <div id="sec-name"></div>
        <div id="sec-dots"></div>
      </div>
      <div class="nav-arrow" onclick="nextSec()" aria-label="próxima seção">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8B3A6B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
    <div id="sec-card"></div>
  </div>

</div>

<script src="js/game-state.js"></script>
<script>
const loaded = loadGameState();
const S = {
  hunger: loaded.hunger,
  water: loaded.water,
  happy: loaded.happy,
  energy: loaded.energy,
  sleeping: false,
  money: loaded.money,
  level: loaded.level,
  xp: loaded.xp
};
let inventory = loaded.inventory;

let sleepInt = null, curSec = 0, sliding = false;
let poodleName = '', isTimao = false;

function persistGame() {
  saveGameState({
    hunger: S.hunger,
    water: S.water,
    happy: S.happy,
    energy: S.energy,
    sleeping: S.sleeping,
    money: S.money,
    level: S.level,
    xp: S.xp,
    inventory: { ...inventory }
  });
}

const SKINS = {
  normal:  { default: 'poodle.png',        sad: 'poodleTriste.png',     happy: 'poodleSatisfeito.png' },
  timao:   { default: 'timao.png',          sad: 'timaoTriste.png',      happy: 'timaoSatisfeito.png'  }
};

const SECTIONS = [
  {
    name: 'ação',
    desc: 'ações diárias com seu poodle!',
    icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f06292" stroke-width="1.8"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>',
    cols: 'cols2',
    btns: [
      { icon: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#e57373" stroke-width="1.5"><path d="M2 12h20M2 12c0-5 4-9 10-9M2 12c0 5 4 9 10 9M22 12c0-5-4-9-10-9M22 12c0 5-4 9-10 9"/></svg>', lbl:'Comer', fn:'useFood()', stock: 'food' },
      { icon: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#64b5f6" stroke-width="1.5"><path d="M12 2C12 2 5 10 5 14a7 7 0 0 0 14 0c0-4-7-12-7-12z"/></svg>', lbl:'Beber', fn:'useWater()', stock: 'water' },
      { icon: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ba68c8" stroke-width="1.5"><path d="M11 5.882V19.24a1.76 1.76 0 0 1-3.417.592l-2.147-6.15M18 13a4 4 0 0 0-4-4H7"/></svg>', lbl:'Carinho', sub:'+5 humor + XP', fn:'petPoodle()' },

function rnd(a) { return a[Math.floor(Math.random()*a.length)]; }
function clamp(v) { return clampStat(v); }
function msg(t) { document.getElementById('msg-box').textContent = t; }

const HEART_CHARS = ['💕', '💖', '💗', '❤️', '🩷'];

function spawnHearts(count) {
  const layer = document.getElementById('hearts-layer');
  const scene = document.getElementById('scene');
  const wrap = document.getElementById('poodle-wrap');
  const sceneRect = scene.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();
  const centerX = wrapRect.left + wrapRect.width / 2 - sceneRect.left;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('span');
    el.className = 'heart-particle' + (Math.random() > 0.6 ? ' large' : Math.random() > 0.5 ? '' : ' small');
    if (Math.random() > 0.4) el.classList.add('burst');
    el.textContent = HEART_CHARS[Math.floor(Math.random() * HEART_CHARS.length)];
    const spread = (Math.random() - 0.5) * 90;
    el.style.left = (centerX + spread) + 'px';
    el.style.bottom = (44 + Math.random() * 50) + 'px';
    el.style.animationDelay = (i * 0.06) + 's';
    if (el.classList.contains('burst')) {
      el.style.setProperty('--hx', (spread * 0.6) + 'px');
    }
    layer.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

function updateMoneyDisplay() {
  document.getElementById('money-amount').textContent = Math.floor(S.money);
}

function stockSubText(type, count) {
  if (count === 0) return 'sem estoque — vá ao mercadinho';
  if (count === 1) return type === 'food' ? '1 ração disponível' : '1 água disponível';
  return type === 'food' ? `${count} rações disponíveis` : `${count} águas disponíveis`;
}

function stockSubClass(count) {
  if (count === 0) return 'stock-none';
  if (count <= 2) return 'stock-low';
  return 'stock-ok';
}

function updateStockDisplay() {
  const food = inventory.food || 0;
  const water = inventory.water || 0;

  document.getElementById('stock-food-count').textContent = food;
  document.getElementById('stock-water-count').textContent = water;

  const foodPill = document.getElementById('stock-food-pill');
  const waterPill = document.getElementById('stock-water-pill');
  foodPill.classList.toggle('stock-empty', food === 0);
  waterPill.classList.toggle('stock-empty', water === 0);

  document.getElementById('stock-food-unit').textContent =
    food === 0 ? 'compre no mercadinho!' : food === 1 ? 'unidade' : 'unidades';
  document.getElementById('stock-water-unit').textContent =
    water === 0 ? 'compre no mercadinho!' : water === 1 ? 'unidade' : 'unidades';

  const foodSub = document.getElementById('sub-food');
  const waterSub = document.getElementById('sub-water');
  const foodBtn = document.getElementById('btn-food');
  const waterBtn = document.getElementById('btn-water');

  if (foodSub) {
    foodSub.textContent = stockSubText('food', food);
    foodSub.className = 'sub ' + stockSubClass(food);
  }
  if (waterSub) {
    waterSub.textContent = stockSubText('water', water);
    waterSub.className = 'sub ' + stockSubClass(water);
  }
  if (foodBtn) foodBtn.classList.toggle('disabled', food === 0);
  if (waterBtn) waterBtn.classList.toggle('disabled', water === 0);
}

function addMoney(amount) {
  S.money += amount;
  updateMoneyDisplay();
  persistGame();
}

function addXP(amount) {
  S.xp += amount;
  const needed = getXpNeeded(S.level);
  
  while (S.xp >= needed) {
    S.xp -= needed;
    S.level++;
    msg(`✨ ${rnd(MSGS.levelUp)} Agora você é nível ${S.level}! ✨`);
    updateUI();
    // Animação de level up
    const levelDiv = document.getElementById('level-row');
    levelDiv.classList.add('level-up-animation');
    setTimeout(() => levelDiv.classList.remove('level-up-animation'), 500);
  }
  
  updateLevelUI();
  persistGame();
}

function updateLevelUI() {
  const needed = getXpNeeded(S.level);
  const percent = (S.xp / needed) * 100;
  document.getElementById('level-number').textContent = S.level;
  document.getElementById('xp-bar').style.width = percent + '%';
  document.getElementById('xp-text').textContent = `${Math.floor(S.xp)}/${needed} XP`;
}

function getSkin() { return isTimao ? SKINS.timao : SKINS.normal; }

function updatePoodleImg() {
  const avg = (S.hunger + S.water + S.happy + S.energy) / 4;
  const skin = getSkin();
  const img = document.getElementById('poodle-img');

  let src;
  if (S.sleeping)    src = skin.default;
  else if (avg < 35) src = skin.sad;
  else if (avg > 70) src = skin.happy;
  else               src = skin.default;

  if (img.src !== src) img.src = src;
}

function floatItem(icon) {
  const el = document.getElementById('itemanim');
  el.textContent = icon;
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'floatup 0.9s ease forwards';
}

function animPoodle(type) {
  const p = document.getElementById('poodle-wrap');
  p.style.animation = 'none';
  p.offsetHeight;
  p.style.animation = `${type} 0.55s ease`;
  setTimeout(() => { p.style.animation = ''; }, 600);
}

function updateUI() {
  document.getElementById('bar-hunger').style.width = S.hunger + '%';
  document.getElementById('val-hunger').textContent = Math.round(S.hunger);
  document.getElementById('bar-water').style.width = S.water + '%';
  document.getElementById('val-water').textContent = Math.round(S.water);
  document.getElementById('bar-happy').style.width = S.happy + '%';
  document.getElementById('val-happy').textContent = Math.round(S.happy);
  document.getElementById('bar-energy').style.width = S.energy + '%';
  document.getElementById('val-energy').textContent = Math.round(S.energy);
  
  const avg = (S.hunger + S.water + S.happy + S.energy) / 4;
  const b = document.getElementById('bubble');
  if (S.sleeping) { b.textContent = '😴'; }
  else b.textContent = avg > 78 ? '🥰' : avg > 60 ? '😊' : avg > 40 ? '😐' : '😢';
  updatePoodleImg();
  updateMoneyDisplay();
  updateLevelUI();
  updateStockDisplay();
}

function useFood() {
  if (S.sleeping) { wakeUp(); }
  if (inventory.food > 0) {
    inventory.food--;
    S.hunger = clamp(S.hunger + 25);
    S.happy = clamp(S.happy + 3);
    floatItem('🍖');
    msg(`🍖 Comida deliciosa! +25 fome. Restam ${inventory.food} rações.`);
    animPoodle('boing');
    updateUI();
    persistGame();
  } else {
    msg(rnd(MSGS.noFood));
    animPoodle('wiggle');
  }
}

function useWater() {
  if (S.sleeping) { wakeUp(); }
  if (inventory.water > 0) {
    inventory.water--;
    S.water = clamp(S.water + 20);
    S.happy = clamp(S.happy + 2);
    floatItem('💧');
    msg(`💧 Água fresquinha! +20 água. Restam ${inventory.water} águas.`);
    animPoodle('boing');
    updateUI();
    persistGame();
  } else {
    msg(rnd(MSGS.noWater));
    animPoodle('wiggle');
  }
}

function renderSection(dir = 1) {
  const sec = SECTIONS[curSec];
  const card = document.getElementById('sec-card');
  card.style.setProperty('--slide-from', dir > 0 ? '40px' : '-40px');
  card.style.animation = 'none';

  document.getElementById('sec-icon').innerHTML = sec.icon;
  document.getElementById('sec-name').textContent = sec.name;

  const dots = document.getElementById('sec-dots');
  dots.innerHTML = SECTIONS.map((_,i) =>
    `<div class="dot${i===curSec?' active':''}"></div>`
  ).join('');

  const btns = sec.btns.map(b => {
    const idAttr = b.id ? `id="${b.id}"` : (b.stock ? `id="btn-${b.stock}"` : '');
    let subHtml;
    if (b.stock) {
      const count = b.stock === 'food' ? (inventory.food || 0) : (inventory.water || 0);
      const disabled = count === 0 ? ' disabled' : '';
      subHtml = `<span class="sub ${stockSubClass(count)}" id="sub-${b.stock}">${stockSubText(b.stock, count)}</span>`;
      return `<button class="act-btn${disabled}" ${idAttr} onclick="${b.fn}">${b.icon}<span class="lbl">${b.lbl}</span>${subHtml}</button>`;
    }
    subHtml = `<span class="sub">${b.sub || ''}</span>`;
    return `<button class="act-btn" ${idAttr} onclick="${b.fn}">${b.icon}<span class="lbl">${b.lbl}</span>${subHtml}</button>`;
  }).join('');
  card.innerHTML = `<div class="sec-desc">${sec.desc}</div><div class="btn-grid ${sec.cols}">${btns}</div>`;
  card.offsetHeight;
  card.style.animation = 'slideIn 0.28s ease forwards';
  updateStockDisplay();
}

function nextSec() {
  if (sliding) return;
  sliding = true;
  curSec = (curSec + 1) % SECTIONS.length;
  renderSection(1);
  setTimeout(() => { sliding = false; }, 320);
}

function prevSec() {
  if (sliding) return;
  sliding = true;
  curSec = (curSec - 1 + SECTIONS.length) % SECTIONS.length;
  renderSection(-1);
  setTimeout(() => { sliding = false; }, 320);
}

function petPoodle() {
  if (S.sleeping) { wakeUp(); return; }
  S.happy = clamp(S.happy + 5);
  addMoney(2);
  addXP(5);
  spawnHearts(5 + Math.floor(Math.random() * 3));
  floatItem('💕');
  msg(rnd(MSGS.pet) + " +2🪙 +5 XP");
  animPoodle('boing');
  updateUI();
  persistGame();
}

function play() {
  if (S.sleeping) { wakeUp(); return; }
  if (S.energy < 15) { msg("Cansada demais pra brincar... me deixa dormir!"); return; }
  S.happy = clamp(S.happy + 20); S.energy = clamp(S.energy - 15);
  S.hunger = clamp(S.hunger - 8); S.water = clamp(S.water - 8);
  addXP(8);
  floatItem('⚽'); msg(rnd(MSGS.play) + " +8 XP"); animPoodle('wiggle'); updateUI(); persistGame();
}

function walk() {
  if (S.sleeping) { wakeUp(); return; }
  if (S.energy < 20) { msg("Preciso descansar antes de passear..."); return; }
  S.happy = clamp(S.happy + 25); S.energy = clamp(S.energy - 20);
  S.hunger = clamp(S.hunger - 12); S.water = clamp(S.water - 12);
  addXP(10);
  floatItem('🌳'); msg(rnd(MSGS.walk) + " +10 XP"); animPoodle('wiggle'); updateUI(); persistGame();
}

function groom() {
  if (S.sleeping) { wakeUp(); return; }
  S.happy = clamp(S.happy + 15);
  addXP(5);
  floatItem('✂️'); msg(rnd(MSGS.groom) + " +5 XP"); animPoodle('boing'); updateUI(); persistGame();
}

function bath() {
  if (S.sleeping) { wakeUp(); return; }
  S.happy = clamp(S.happy + 20); S.water = clamp(S.water + 10);
  addXP(6);
  floatItem('🫧'); msg(rnd(MSGS.bath) + " +6 XP"); animPoodle('boing'); updateUI(); persistGame();
}

function toggleSleep() { S.sleeping ? wakeUp() : goSleep(); }

function goSleep() {
  S.sleeping = true;
  const b = document.getElementById('sleep-btn');
  if (b) b.querySelector('.lbl').textContent = 'Acordar';
  document.getElementById('zzz').style.animation = 'floatzz 1.8s ease infinite';
  msg(rnd(MSGS.sleep)); updateUI(); persistGame();
  sleepInt = setInterval(() => {
    S.energy = clamp(S.energy + 6); S.hunger = clamp(S.hunger - 1.5); S.water = clamp(S.water - 1.5);
    addXP(1);
    updateUI();
    if (S.energy >= 100) wakeUp();
  }, 900);
}

function wakeUp() {
  if (!S.sleeping) return;
  S.sleeping = false;
  clearInterval(sleepInt);
  document.getElementById('zzz').style.animation = 'none';
  const b = document.getElementById('sleep-btn');
  if (b) b.querySelector('.lbl').textContent = 'Dormir';
  msg(rnd(MSGS.wake)); updateUI(); persistGame();
}

setInterval(() => {
  if (S.sleeping) return;
  S.hunger = clamp(S.hunger - 0.8); 
  S.water = clamp(S.water - 1.2);
  S.happy = clamp(S.happy - 0.5);  
  S.energy = clamp(S.energy - 0.3);
  
  const low = Math.min(S.hunger, S.water, S.happy, S.energy);
  if (low < 25) {
    if (S.hunger === low && S.hunger < 25) msg(rnd(MSGS.hungry));
    else if (S.water === low && S.water < 25) msg(rnd(MSGS.thirsty));
    else if (S.energy === low && S.energy < 20) msg(rnd(MSGS.tired));
    else if (S.happy === low && S.happy < 30) msg(rnd(MSGS.sad));
  }
  updateUI();
  persistGame();
}, 3500);

window.addEventListener('beforeunload', persistGame);

window.addEventListener('focus', () => {
  const fresh = loadGameState();
  inventory = fresh.inventory;
  S.money = fresh.money;
  updateUI();
});

(function init() {
  if (!sessionStorage.getItem('poodleName')) {
    window.location.href = 'index.html';
    return;
  }

  poodleName = getPoodleName();
  isTimao = isTimaoSkin();

  document.getElementById('name-display').textContent = poodleName;
  document.title = `${poodleName} — Petit Poodle`;

  if (isTimao) {
    document.getElementById('timao-badge').classList.add('show');
    document.getElementById('poodle-img').src = 'timao.png';
    applyTimaoTheme();
    msg(`Vai Timão! ⚫⚪ Cuide bem do ${poodleName}!`);
  } else {
    msg(`Oi! Meu nome é ${poodleName}! Preciso de comida e água! 🥺`);
  }

  renderSection(1);
  updateUI();
  updateMoneyDisplay();
  persistGame();
})();
</script>
